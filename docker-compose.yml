version: '3.8'

services:
  osrm:
    image: ghcr.io/project-osrm/osrm-backend
    container_name: osrm-server
    ports:
      - "5000:5000"
    volumes:
      - ./osrm-data:/data
    command: osrm-routed --algorithm mld /data/madagascar-latest.osrm
    restart: unless-stopped
    networks:
      - app-network

  app:
    build: .
    container_name: shortest-path-app
    ports:
      - "3000:3000"
    environment:
      - OSRM_URL=http://osrm:5000
      - NODE_ENV=production
    depends_on:
      - osrm
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
